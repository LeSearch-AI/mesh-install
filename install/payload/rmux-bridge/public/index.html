<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>rmux bridge</title>
    <link rel="stylesheet" href="/xterm/xterm.css" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #10151d;
        --panel: #182231;
        --panel-2: #223246;
        --accent: #66d9ef;
        --text: #edf2f7;
        --muted: #a7b4c7;
        --danger: #ff8a80;
        --border: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 190px;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background:
          radial-gradient(circle at top, rgba(102, 217, 239, 0.16), transparent 32%),
          linear-gradient(180deg, #10151d 0%, #0b0f15 100%);
        color: var(--text);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        --page-pad: 10px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 10px;
        height: 100vh;
        height: 100dvh;
        padding-top: calc(var(--page-pad) + env(safe-area-inset-top));
        padding-right: calc(var(--page-pad) + env(safe-area-inset-right));
        padding-bottom: calc(var(--page-pad) + env(safe-area-inset-bottom));
        padding-left: calc(var(--page-pad) + env(safe-area-inset-left));
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        min-width: 0;
      }

      .group {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(24, 34, 49, 0.86);
        backdrop-filter: blur(10px);
      }

      button {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        min-height: 40px;
        min-width: 40px;
        padding: 0 12px;
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
        font-weight: 600;
        touch-action: manipulation;
      }

      button.active {
        background: var(--accent);
        border-color: transparent;
        color: #071018;
      }

      button:active {
        transform: translateY(1px);
      }

      .status {
        flex: 1 1 180px;
        min-width: 0;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(24, 34, 49, 0.72);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      #terminal {
        position: relative;
        min-width: 0;
        min-height: 0;
        width: 100%;
        height: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: rgba(11, 15, 21, 0.84);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        touch-action: pan-y;
      }

      #terminal .xterm {
        height: 100%;
        width: 100%;
      }

      #terminal .xterm-viewport {
        overflow-x: hidden !important;
        overflow-y: auto !important;
        max-width: 100%;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        touch-action: pan-y;
      }

      #terminal .xterm-screen,
      #terminal .xterm-helpers {
        touch-action: pan-y;
      }

      @media (max-width: 520px) {
        body {
          --page-pad: 8px;
          gap: 8px;
        }

        .group {
          width: 100%;
        }

        button {
          flex: 1 0 auto;
        }

      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="group" id="modifiers">
        <button type="button" data-mod="ctrl">Ctrl</button>
        <button type="button" data-mod="shift">Shift</button>
        <button type="button" data-mod="alt">Alt</button>
      </div>
      <div class="group">
        <button type="button" data-send="\u001b">Esc</button>
        <button type="button" data-send="\t">Tab</button>
        <button type="button" data-send="\u001b[A">↑</button>
        <button type="button" data-send="\u001b[B">↓</button>
        <button type="button" data-send="\u001b[D">←</button>
        <button type="button" data-send="\u001b[C">→</button>
      </div>
      <div class="group">
        <button type="button" data-action="new-pane">+ pane</button>
        <button type="button" data-action="split-h">split h</button>
        <button type="button" data-action="split-v">split v</button>
      </div>
      <div class="status" id="status">connecting</div>
    </div>
    <div id="terminal"></div>
    <script src="/xterm/xterm.js"></script>
    <script src="/xterm/addon-fit.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const session = params.get("session") || "spine-test";
      const pane = params.get("pane") || "";
      const statusEl = document.getElementById("status");
      const terminalEl = document.getElementById("terminal");
      const textDecoder = new TextDecoder();
      const term = new window.Terminal({
        cursorBlink: true,
        scrollback: 10000,
        allowTransparency: true,
        fontSize: 12,
        fontFamily:
          'ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", monospace',
        theme: {
          background: "#0b0f15",
          foreground: "#edf2f7",
          cursor: "#66d9ef",
        },
      });
      const fitAddon = new window.FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(terminalEl);

      const attachParams = new URLSearchParams({ session });
      if (pane) {
        attachParams.set("pane", pane);
      }
      const ws = new WebSocket(`ws://${location.host}/attach?${attachParams.toString()}`);
      ws.binaryType = "arraybuffer";

      const modifiers = {
        ctrl: false,
        shift: false,
        alt: false,
      };

      function syncModifiers() {
        document.querySelectorAll("[data-mod]").forEach((button) => {
          const key = button.getAttribute("data-mod");
          button.classList.toggle("active", Boolean(key && modifiers[key]));
        });
      }

      function setStatus(text, tone) {
        statusEl.textContent = `${session} • ${text}`;
        statusEl.style.color = tone || "var(--muted)";
      }

      function sendJson(payload) {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(payload));
        }
      }

      function sendInput(data) {
        if (!data) {
          return;
        }
        sendJson({ type: "input", data });
      }

      function applyModifiers(data) {
        let output = data;
        if (modifiers.ctrl && /^[a-zA-Z]$/.test(output)) {
          output = String.fromCharCode(output.toUpperCase().charCodeAt(0) - 64);
        } else if (modifiers.shift && /^[a-z]$/.test(output)) {
          output = output.toUpperCase();
        }
        if (modifiers.alt) {
          output = "\u001b" + output;
        }
        return output;
      }

      function sendResize() {
        if (term.cols > 0 && term.rows > 0) {
          sendJson({ type: "resize", cols: term.cols, rows: term.rows });
        }
      }

      let fitTimer = 0;
      let fitFrame = 0;
      let firstSocketMessageHandled = false;

      function runFit() {
        fitFrame = 0;
        fitAddon.fit();
        sendResize();
      }

      function scheduleFit(delay = 48) {
        if (fitTimer) {
          window.clearTimeout(fitTimer);
        }
        if (fitFrame) {
          window.cancelAnimationFrame(fitFrame);
        }
        fitTimer = window.setTimeout(() => {
          fitTimer = 0;
          fitFrame = window.requestAnimationFrame(runFit);
        }, delay);
      }

      function writeToTerminal(data) {
        return new Promise((resolve) => {
          term.write(data, resolve);
        });
      }

      document.querySelectorAll("[data-mod]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.getAttribute("data-mod");
          if (!key) {
            return;
          }
          modifiers[key] = !modifiers[key];
          syncModifiers();
          term.focus();
        });
      });

      document.querySelectorAll("[data-send]").forEach((button) => {
        button.addEventListener("click", () => {
          sendInput(button.getAttribute("data-send") || "");
          term.focus();
        });
      });

      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.getAttribute("data-action");
          if (action === "new-pane") {
            sendJson({ type: "new-pane" });
          } else if (action === "split-h") {
            sendJson({ type: "split", dir: "h" });
          } else if (action === "split-v") {
            sendJson({ type: "split", dir: "v" });
          }
          term.focus();
        });
      });

      term.onData((data) => {
        sendInput(applyModifiers(data));
      });

      ws.addEventListener("open", () => {
        setStatus("connected", "var(--accent)");
        scheduleFit();
        term.focus();
      });

      ws.addEventListener("close", (event) => {
        setStatus(`closed (${event.code})`, "var(--danger)");
      });

      ws.addEventListener("error", () => {
        setStatus("error", "var(--danger)");
      });

      ws.addEventListener("message", async (event) => {
        let output = "";
        if (typeof event.data === "string") {
          output = event.data;
        } else if (event.data instanceof ArrayBuffer) {
          output = textDecoder.decode(event.data);
        } else if (event.data instanceof Blob) {
          output = await event.data.text();
        } else {
          return;
        }
        await writeToTerminal(output);
        if (!firstSocketMessageHandled) {
          firstSocketMessageHandled = true;
          scheduleFit();
        }
      });

      const resizeObserver = new ResizeObserver(() => {
        scheduleFit();
      });
      resizeObserver.observe(terminalEl);
      window.addEventListener("resize", () => {
        scheduleFit();
      });
      window.addEventListener("orientationchange", () => {
        scheduleFit();
      });

      syncModifiers();
      setStatus("connecting", "var(--muted)");
      scheduleFit(0);
    </script>
  </body>
</html>
